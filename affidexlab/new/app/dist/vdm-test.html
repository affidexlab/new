<!DOCTYPE html>
<html>
<head>
    <title>VDM Balance Tester</title>
    <script src="https://unpkg.com/@solana/web3.js@latest/lib/index.iife.min.js"></script>
    <style>
        body { font-family: Arial; padding: 20px; background: #0a0e27; color: white; }
        .result { background: #1a1f3a; padding: 15px; margin: 10px 0; border-radius: 8px; }
        .success { color: #00ff00; }
        .error { color: #ff0000; }
        button { background: #3396FF; color: white; padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>
    <h1>🔍 VDM Balance Debug Tool</h1>
    <p>Testing wallet: <code>3Z2y4VUjDYU6sapVFfmZAStGDaTrYcCjXinwZqBgMopk</code></p>
    
    <button onclick="testBalance()">🚀 Test VDM Balance Now</button>
    
    <div id="results"></div>
    
    <script>
        const VDM_TOKEN = 'B2a9z1fwTvLXMDoaA3pm4MLXtfMjA3nQLs2dSNivCwS5';
        const TEST_WALLET = '3Z2y4VUjDYU6sapVFfmZAStGDaTrYcCjXinwZqBgMopk';
        
        function log(message, type = 'info') {
            const div = document.createElement('div');
            div.className = 'result ' + type;
            div.innerHTML = message;
            document.getElementById('results').appendChild(div);
        }
        
        async function testBalance() {
            document.getElementById('results').innerHTML = '';
            log('🔄 Starting VDM balance test...', 'info');
            
            try {
                // Test 1: Check if Solana Web3 is loaded
                log('✅ Test 1: Solana Web3.js loaded', 'success');
                
                // Test 2: Create connection
                log('🔄 Test 2: Connecting to Solana RPC...', 'info');
                const connection = new solanaWeb3.Connection('https://api.mainnet-beta.solana.com', 'confirmed');
                log('✅ Test 2: Connection created', 'success');
                
                // Test 3: Check VDM mint exists
                log('🔄 Test 3: Checking VDM token mint...', 'info');
                const vdmMint = new solanaWeb3.PublicKey(VDM_TOKEN);
                const mintInfo = await connection.getAccountInfo(vdmMint);
                if (!mintInfo) {
                    log('❌ Test 3: VDM mint not found!', 'error');
                    return;
                }
                log(`✅ Test 3: VDM mint found - Owner: ${mintInfo.owner.toString()}`, 'success');
                
                // Test 4: Get wallet public key
                log('🔄 Test 4: Creating wallet public key...', 'info');
                const walletPubkey = new solanaWeb3.PublicKey(TEST_WALLET);
                log('✅ Test 4: Wallet public key created', 'success');
                
                // Test 5: Get token accounts
                log('🔄 Test 5: Fetching token accounts...', 'info');
                const tokenProgramId = solanaWeb3.TOKEN_PROGRAM_ID;
                log(`   Using program: ${tokenProgramId.toString()}`, 'info');
                
                const tokenAccounts = await connection.getParsedTokenAccountsByOwner(
                    walletPubkey,
                    { programId: tokenProgramId }
                );
                
                log(`✅ Test 5: Found ${tokenAccounts.value.length} token accounts`, 'success');
                
                // Test 6: Look for VDM token
                log('🔄 Test 6: Searching for VDM token...', 'info');
                let vdmFound = false;
                let vdmBalance = 0;
                
                tokenAccounts.value.forEach((account, index) => {
                    const parsedInfo = account.account.data.parsed.info;
                    const mint = parsedInfo.mint;
                    const balance = parsedInfo.tokenAmount.uiAmount;
                    const decimals = parsedInfo.tokenAmount.decimals;
                    
                    log(`   Token ${index + 1}: ${mint.substring(0, 8)}... = ${balance} (decimals: ${decimals})`, 'info');
                    
                    if (mint === VDM_TOKEN) {
                        vdmFound = true;
                        vdmBalance = balance;
                        log(`   🎉 VDM TOKEN FOUND!`, 'success');
                        log(`   Account: ${account.pubkey.toString()}`, 'success');
                        log(`   Balance: ${balance} VDM`, 'success');
                        log(`   Decimals: ${decimals}`, 'success');
                        log(`   Raw Amount: ${parsedInfo.tokenAmount.amount}`, 'success');
                    }
                });
                
                // Final result
                if (vdmFound) {
                    log(`<br>🎉 <strong>SUCCESS! VDM BALANCE: ${vdmBalance.toLocaleString()} VDM</strong>`, 'success');
                    log(`<br>✅ If DecaFlow shows 0 but this shows ${vdmBalance}, there's a bug in the app code.`, 'info');
                } else {
                    log(`<br>❌ VDM token NOT found in wallet`, 'error');
                    log(`   This means either:`, 'info');
                    log(`   1. Wrong wallet address`, 'error');
                    log(`   2. Wallet has no VDM tokens`, 'error');
                    log(`   3. Tokens are in a different token program`, 'error');
                }
                
                // Test 7: Try TOKEN_2022_PROGRAM_ID
                log('<br>🔄 Test 7: Checking TOKEN_2022_PROGRAM...', 'info');
                try {
                    const token2022Accounts = await connection.getParsedTokenAccountsByOwner(
                        walletPubkey,
                        { programId: solanaWeb3.TOKEN_2022_PROGRAM_ID }
                    );
                    log(`✅ Test 7: Found ${token2022Accounts.value.length} accounts in TOKEN_2022`, 'success');
                    
                    token2022Accounts.value.forEach((account, index) => {
                        const parsedInfo = account.account.data.parsed.info;
                        const mint = parsedInfo.mint;
                        const balance = parsedInfo.tokenAmount.uiAmount;
                        
                        if (mint === VDM_TOKEN) {
                            log(`   🎉 VDM FOUND IN TOKEN_2022!`, 'success');
                            log(`   Balance: ${balance} VDM`, 'success');
                            vdmFound = true;
                            vdmBalance = balance;
                        }
                    });
                } catch (e) {
                    log(`   ⚠️ TOKEN_2022 check failed: ${e.message}`, 'error');
                }
                
            } catch (error) {
                log(`<br>❌ FATAL ERROR: ${error.message}`, 'error');
                log(`Stack: ${error.stack}`, 'error');
            }
        }
    </script>
</body>
</html>
