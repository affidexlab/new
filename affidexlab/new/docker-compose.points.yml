# DecaFlow Points System - Docker Deployment

version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: decaflow-postgres
    environment:
      POSTGRES_DB: decaflow
      POSTGRES_USER: ${POSTGRES_USER:-decaflow}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./affidexlab/new/backend/src/db/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U decaflow"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - decaflow

  backend:
    build:
      context: ./affidexlab/new/backend
      dockerfile: Dockerfile
    container_name: decaflow-backend
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-decaflow}:${POSTGRES_PASSWORD:-changeme}@postgres:5432/decaflow
      NODE_ENV: production
      PORT: 3000
      ZEROX_API_KEY: ${ZEROX_API_KEY}
      SOCKET_API_KEY: ${SOCKET_API_KEY}
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - decaflow
    restart: unless-stopped

  cron-weekly:
    build:
      context: ./affidexlab/new/backend
      dockerfile: Dockerfile
    container_name: decaflow-cron-weekly
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-decaflow}:${POSTGRES_PASSWORD:-changeme}@postgres:5432/decaflow
    command: >
      sh -c "echo '0 0 * * 1 node /app/src/scripts/weekly-reset.js' | crontab - && crond -f"
    depends_on:
      - postgres
    networks:
      - decaflow
    restart: unless-stopped

  cron-monthly:
    build:
      context: ./affidexlab/new/backend
      dockerfile: Dockerfile
    container_name: decaflow-cron-monthly
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-decaflow}:${POSTGRES_PASSWORD:-changeme}@postgres:5432/decaflow
    command: >
      sh -c "echo '0 0 1 * * node /app/src/scripts/monthly-reset.js' | crontab - && crond -f"
    depends_on:
      - postgres
    networks:
      - decaflow
    restart: unless-stopped

  cron-leaderboard:
    build:
      context: ./affidexlab/new/backend
      dockerfile: Dockerfile
    container_name: decaflow-cron-leaderboard
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-decaflow}:${POSTGRES_PASSWORD:-changeme}@postgres:5432/decaflow
    command: >
      sh -c "echo '*/5 * * * * node /app/src/scripts/refresh-leaderboard.js' | crontab - && crond -f"
    depends_on:
      - postgres
    networks:
      - decaflow
    restart: unless-stopped

volumes:
  postgres_data:

networks:
  decaflow:
    driver: bridge
